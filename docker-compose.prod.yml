  networks:
    - hosta-network

  healthcheck:
    test: ["CMD", "node", "-e", "require('http').get('http://localhost:3019/health', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1)).on('error', () => process.exit(1))"]
