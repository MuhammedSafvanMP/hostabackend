services:
  api-gateway:
    image: safvanmp/hosta-api-gateway:latest
    container_name: api-gateway
    restart: always
    ports:
      - "80:3000"
    env_file: .env.api-gateway
    networks:
      - hosta-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  user-service:
    image: safvanmp/hosta-user-service:latest
