name: Deploy Production (EC2)

on:
  push:
    branches:
      - production

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # Extremely important for microservices
      max-parallel: 2
      matrix:
        service:
          - ads-service
          - ambulance-service
          - api-gateway
          - blood-bank-service
          - blooddonor-service
          - booking-service
          - bulmq-service
          - doctor-service
          - hospital-service
          - lab-service
          - medicinremainder-service
          - notification-service
          - pharmacy-service
          - review-service
          - role-service
          - s3-service
          - socketio-service
          - speciality-service
          - staff-service
          - user-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Prepare Image Name
        id: prep
        run: |
          # Safely lowercase the image name
          LOW_NAME=$(echo "${{ matrix.service }}" | tr '[:upper:]' '[:lower:]')
          echo "image_tag=${{ secrets.DOCKER_USERNAME }}/hosta-${LOW_NAME}:latest" >> $GITHUB_OUTPUT

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.prep.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p /home/ubuntu/app
            cd /home/ubuntu/app
            
            # Sync docker-compose.prod.yml
            cat > docker-compose.prod.yml << 'EOF'
            ${{ secrets.DOCKER_COMPOSE_PROD }}
            EOF
            
            # Sync .env
            echo "${{ secrets.ENV_FILE }}" > .env
            
            # Login and Deploy
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -af
