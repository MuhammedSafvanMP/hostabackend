name: Deploy Production (EC2)

on:
  push:
    branches:
      - production
    paths:
      - '**'

jobs:

  # ==========================================
  # BUILD & PUSH DOCKER IMAGES
  # ==========================================
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: ads-service
            image: hosta-ads-service
          - service: ambulance-service
            image: hosta-ambulance-service
          - service: api-gateway
            image: hosta-api-gateway
          - service: blood-bank-service
            image: hosta-blood-bank-service
          - service: bloodDonor-service
            image: hosta-blooddonor-service
          - service: booking-service
            image: hosta-booking-service
          - service: bulmq-service
            image: hosta-bulmq-service
          - service: doctor-service
            image: hosta-doctor-service
          - service: hospital-service
            image: hosta-hospital-service
          - service: lab-service
            image: hosta-lab-service
          - service: medicinremainder-service
            image: hosta-medicinremainder-service
          - service: notification-service
            image: hosta-notification-service
          - service: pharmacy-service
            image: hosta-pharmacy-service
          - service: review-service
            image: hosta-review-service
          - service: role-service
            image: hosta-role-service
          - service: s3-service
            image: hosta-s3-service
          - service: socketio-service
            image: hosta-socketio-service
          - service: speciality-service
            image: hosta-speciality-service
          - service: staff-service
            image: hosta-staff-service
          - service: user-service
            image: hosta-user-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/${{ matrix.image }}:latest


  # ==========================================
  # DEPLOY TO EC2
  # ==========================================
  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker-compose to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "/home/ubuntu/app"

      - name: Create .env file on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p /home/ubuntu/app

            cat > /home/ubuntu/app/.env << 'EOF'
            ${{ secrets.ENV_FILE }}
            EOF

      - name: Deploy containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/app

            export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}

            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d

            docker image prune -af