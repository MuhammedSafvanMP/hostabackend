name: Deploy Production (EC2)

on:
  push:
    branches:
      - production

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # Extremely important for microservices
      max-parallel: 2
      matrix:
        service:
          - ads-service
          - ambulance-service
          - api-gateway
          - blood-bank-service
          - blooddonor-service
          - booking-service
          - bulmq-service
          - doctor-service
          - hospital-service
          - notification-service
          - review-service
          - role-service
          - s3-service
          - socketio-service
          - speciality-service
          - staff-service
          - user-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Prepare Image Name
        id: prep
        run: |
          # Safely lowercase the image name
          LOW_NAME=$(echo "${{ matrix.service }}" | tr '[:upper:]' '[:lower:]')
          echo "image_tag=${{ secrets.DOCKER_USERNAME }}/hosta-${LOW_NAME}:latest" >> $GITHUB_OUTPUT

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.prep.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker-compose to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "/home/ubuntu/app"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p /home/ubuntu/app
            cd /home/ubuntu/app
            
            # Sync .env files individually to prevent variable collisions (like PORT)
            echo "${{ secrets.APIGATEWAY_SERVICE_ENV }}" > .env.api-gateway
            echo "${{ secrets.USER_SERVICE_ENV }}" > .env.user-service
            echo "${{ secrets.AMBULANCE_SERVICE_ENV }}" > .env.ambulance-service
            echo "${{ secrets.BLOODDONOR_SERVICE_ENV }}" > .env.blood-service
            echo "${{ secrets.BLOODBANK_SERVICE_ENV }}" > .env.blood-bank-service
            # echo "${{ secrets.PHARMACY_SERVICE_ENV }}" > .env.pharmacy-service
            echo "${{ secrets.STAFF_SERVICE_ENV }}" > .env.staff-service
            echo "${{ secrets.DOCTOR_SERVICE_ENV }}" > .env.doctor-service
            echo "${{ secrets.SPECIALITY_SERVICE_ENV }}" > .env.speciality-service
            echo "${{ secrets.HOSPITAL_SERVICE_ENV }}" > .env.hospital-service
            # echo "${{ secrets.MEDICINREMINDER_SERVICE_ENV }}" > .env.medicine-reminder-service
            echo "${{ secrets.BOOKING_SERVICE_ENV }}" > .env.booking-service
            echo "${{ secrets.NOTIFICATION_SERVICE_ENV }}" > .env.notification-service
            echo "${{ secrets.REVIEW_SERVICE_ENV }}" > .env.review-service
            # echo "${{ secrets.LAB_SERVICE_ENV }}" > .env.lab-service
            echo "${{ secrets.ADS_SERVICE_ENV }}" > .env.ads-service
            echo "${{ secrets.ROLE_SERVICE_ENV }}" > .env.role-service
            echo "${{ secrets.S3_SERVICE_ENV }}" > .env.s3-service
            echo "${{ secrets.BULMQ_SERVICE_ENV }}" > .env.bulmq-service
            echo "${{ secrets.SOCKETIO_SERVICE_ENV }}" > .env.socketio-service
                        # Login and Deploy
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            
            docker compose -f docker-compose.prod.yml down --remove-orphans
            
            # Pull services one-by-one to avoid rate limits
            docker compose -f docker-compose.prod.yml config --services | xargs -I {} docker compose -f docker-compose.prod.yml pull {}
            
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -af
