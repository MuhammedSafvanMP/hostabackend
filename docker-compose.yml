
services:
  api-gateway:
    build: ./api-gateway
    ports:
      - "3000:3000"
    env_file:
      - ./api-gateway/.env
    depends_on:
      - user-service
      - ambulance-service
      - blood-service
      - blood-bank-service
      - pharmacy-service
      - staff-service
    networks:
      - hosta-network

  user-service:
    build: ./user-service
    env_file:
      - ./user-service/.env
    networks:
      - hosta-network

  ambulance-service:
    build: ./ambulance-service
    env_file:
      - ./ambulance-service/.env
    networks:
      - hosta-network

  blood-service:
    build: ./blood-service
    env_file:
      - ./blood-service/.env
    networks:
      - hosta-network

  blood-bank-service:
    build: ./blood-bank-service
    env_file: ./blood-bank-service/.env
    networks:
      - hosta-network

  pharmacy-service:
    build: ./pharmacy-service
    env_file: ./pharmacy-service/.env
    networks:
      - hosta-network 

  staff-service:
    build: ./staff-service
    env_file: ./staff-service/.env
    networks:
      - hosta-network

  doctor-service:
    build: ./doctor-service
    env_file: ./doctor-service/.env
    networks:
      - hosta-network

  speciality-service:
    build: ./speciality-service
    env_file: ./speciality-service/.env
    networks:
      - hosta-network 

  hospital-service:
    build: ./hospital-service
    env_file: ./hospital-service/.env
    networks: 
      - hosta-network 

  
networks:
  hosta-network:
    driver: bridge


